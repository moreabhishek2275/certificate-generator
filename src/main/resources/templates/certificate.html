<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Certificate</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
        }

        .certificate {
            width: 900px;
            height: 550px;
            padding: 40px;
            background: white;
            border: 10px solid #000;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .text {
            font-size: 20px;
        }

        .name {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
        }

        .footer {
            margin-top: 40px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="certificate">
    <h1>CERTIFICATE</h1>

    <p class="text">This is to certify that</p>

    <div class="name" th:text="${name}">Name</div>

    <p class="text">has successfully completed</p>

    <div class="name" th:text="${role}">Role</div>

    <p class="text">in</p>

    <div class="name" th:text="${event}">Event</div>

</div>

</body>
</html>
